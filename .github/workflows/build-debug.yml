name: Build Debug APK (Russian)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize and grant execute permission for gradlew
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

      - name: Build Debug APK (arm64-v8a)
        run: |
          mkdir -p dist
          ./gradlew assembleDebug -PabiOnly=arm64-v8a
          find app/build/outputs/apk/debug -type f -name "*.apk" -exec cp {} dist/ \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KunBox-debug-russian
          path: dist/*.apk
          retention-days: 30
